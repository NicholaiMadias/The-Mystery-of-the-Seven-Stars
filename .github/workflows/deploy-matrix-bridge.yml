name: Deploy Matrix Bridge

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/matrix_bridge/requirements.txt
      - run: echo "Deploying Matrix Bridge..."

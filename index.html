<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00ff41" />
    <meta name="description" content="Nexus OS v15 — Divine Revelation. Software engineering portfolio and personal OS hub." />
    <link rel="manifest" href="/manifest.json" />
    <title>Nexus OS — Nicholai Maro Madias</title>
    <script>
      // These globals are injected by the hosting environment.
      // Fallback to empty string so JSON.parse in App.jsx never sees undefined.
      window.__firebase_config = window.__firebase_config || '{}';
      window.__app_id = window.__app_id || 'nexus-os-v15';
      window.__initial_auth_token = window.__initial_auth_token || '';
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js');
        });
      }
    </script>
  </body>
</html>
